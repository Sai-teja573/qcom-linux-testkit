metadata:
    format: Lava-Test Test Definition 1.0
    name: AUSanity
    description: "Baseline AU Sanity test plan"
    maintainer:
        - vnarapar@qti.qualcomm.com
    os:
        - openembedded
    scope:
        - functional
    devices:
        - rb3gen2

run:
  steps:
    - cd Runner

    # Existing tests
    - $PWD/suites/Kernel/FunctionalArea/baseport/force_kernel_panic/run.sh || true
    - $PWD/utils/send-to-lava.sh $PWD/suites/Kernel/FunctionalArea/baseport/force_kernel_panic/force_kernel_panic.res || true
    # Final result parsing
    - $PWD/utils/result_parse.sh

